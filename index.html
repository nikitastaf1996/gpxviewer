<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#333333">
    <title>Simple GPX Viewer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href='https://api.mapbox.com/mapbox.js/plugins/leaflet-fullscreen/v1.0.1/leaflet.fullscreen.css' rel='stylesheet' />
    <link rel="stylesheet" href="./styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data>

<header>
    <h1>GPX Viewer for Runners</h1>
</header>

<div id="tab-analyze" class="tab-content" x-data="analyze" x-show="$store.app.activeTab === 'analyze'" :class="{ 'active': $store.app.activeTab === 'analyze' }">
    <div id="analyze-fallback" class="fallback-ui" x-show="!$store.app.activeGpx">
        <div class="fallback-content">
            <span class="fallback-icon">🗺️</span>
            <p>Select a run from your Library to begin analysis.</p>
            <button x-on:click="$store.app.showTab('library')" class="action-btn-primary">Go to Library</button>
        </div>
    </div>

    <div id="analyze-data" x-show="$store.app.activeGpx" style="display: none;" :style="$store.app.activeGpx ? 'display: flex' : 'display: none'">
        <div id="stats">
            <div class="stat-item">
                <span class="stat-label">Distance</span>
                <span class="stat-value" x-text="$store.app.activeGpxStats.distance || '-'">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total Time</span>
                <span class="stat-value" x-text="$store.app.activeGpxStats.duration || '-'">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Pace</span>
                <span class="stat-value" x-text="$store.app.activeGpxStats.pace || '-'">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Elevation Gain</span>
                <span class="stat-value" x-text="$store.app.activeGpxStats.elevationGain || '-'">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Elevation Loss</span>
                <span class="stat-value" x-text="$store.app.activeGpxStats.elevationLoss || '-'">-</span>
            </div>
        </div>

        <div id="main-content">
            <div id="map"></div>
        </div>

        <div id="charts-container">
            <div class="chart-wrapper" id="wrapper-elevation" x-show="$store.app.visibleCharts.elevation">
                <canvas id="elevation-chart"></canvas>
            </div>
            <div class="chart-wrapper" id="wrapper-pace" x-show="$store.app.visibleCharts.pace">
                <canvas id="pace-chart"></canvas>
            </div>
            <div class="chart-wrapper" id="wrapper-combo" x-show="$store.app.visibleCharts.combo">
                <canvas id="combo-chart"></canvas>
            </div>
            <div class="chart-wrapper" id="wrapper-climb" x-show="$store.app.visibleCharts.climb">
                <canvas id="climb-chart"></canvas>
            </div>
            <div class="chart-wrapper" id="wrapper-splits" x-show="$store.app.visibleCharts.splits">
                <canvas id="splits-chart"></canvas>
            </div>
        </div>
    </div>
</div>

<div id="tab-library" class="tab-content" x-data="library" x-show="$store.app.activeTab === 'library'" :class="{ 'active': $store.app.activeTab === 'library' }">
    <div class="tab-header">
        <h2>Library</h2>
        <div style="display: flex; gap: 0.5rem;">
            <label for="zip-file" class="add-btn" title="Import ZIP" style="background-color: #28a745; font-size: 14px; font-weight: bold;">
                <span>ZIP</span>
                <input type="file" id="zip-file" accept=".zip" x-on:change="handleZipFileUpload" />
            </label>
            <label for="gpx-file" class="add-btn" title="Add GPX File">
                <span>+</span>
                <input type="file" id="gpx-file" accept=".gpx" x-on:change="handleFileUpload" />
            </label>
        </div>
    </div>
    <div x-show="isImporting" style="padding: 1rem; background: #eee; border-bottom: 1px solid #ddd;">
        <div style="margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: bold;">Importing... <span x-text="importProgress + '%'"></span></div>
        <div style="width: 100%; background: #ccc; height: 10px; border-radius: 5px; overflow: hidden;">
            <div :style="'width: ' + importProgress + '%; background: #28a745; height: 100%; transition: width 0.2s;'"></div>
        </div>
    </div>
    <div id="saved-list">
        <template x-for="file in $store.app.savedFiles" :key="file.filename">
            <div class="run-card" x-on:click="displayGpx(file)">
                <div class="run-info">
                    <div class="run-main-info" x-text="formatRunCard(file)"></div>
                </div>
                <button class="delete-btn" x-on:click.stop="deleteGpx(file.filename)">Delete</button>
            </div>
        </template>
    </div>
</div>

<div id="tab-trends" class="tab-content" x-show="$store.app.activeTab === 'trends'" :class="{ 'active': $store.app.activeTab === 'trends' }">
    <div class="tab-header">
        <h2>Trends</h2>
    </div>
    <div class="placeholder-ui">
        <span class="fallback-icon">📈</span>
        <p>Trends dashboard coming soon...</p>
    </div>
</div>

<div id="tab-settings" class="tab-content" x-data="settings" x-show="$store.app.activeTab === 'settings'" :class="{ 'active': $store.app.activeTab === 'settings' }">
    <div class="tab-header">
        <h2>Settings</h2>
    </div>
    <div class="settings-list">
        <h3>Chart Visibility</h3>
        <div class="setting-item">
            <label>Elevation Profile</label>
            <input type="checkbox" x-model="$store.app.visibleCharts.elevation" x-on:change="$store.app.saveSettings()">
        </div>
        <div class="setting-item">
            <label>Pace & GAP</label>
            <input type="checkbox" x-model="$store.app.visibleCharts.pace" x-on:change="$store.app.saveSettings()">
        </div>
        <div class="setting-item">
            <label>Elevation & Pace</label>
            <input type="checkbox" x-model="$store.app.visibleCharts.combo" x-on:change="$store.app.saveSettings()">
        </div>
        <div class="setting-item">
            <label>Hill Consistency Matrix</label>
            <input type="checkbox" x-model="$store.app.visibleCharts.climb" x-on:change="$store.app.saveSettings()">
        </div>
        <div class="setting-item">
            <label>Split Performance</label>
            <input type="checkbox" x-model="$store.app.visibleCharts.splits" x-on:change="$store.app.saveSettings()">
        </div>
        <h3>Danger Zone</h3>
        <div class="setting-item">
            <button x-on:click="if(confirm('Are you sure you want to clear your entire library?')) clearLibrary()" class="delete-btn" style="width: 100%;">Clear Library</button>
        </div>
    </div>
</div>

<nav id="bottom-nav">
    <button class="nav-item" :class="{ 'active': $store.app.activeTab === 'analyze' }" x-on:click="$store.app.showTab('analyze')">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Analyze</span>
    </button>
    <button class="nav-item" :class="{ 'active': $store.app.activeTab === 'library' }" x-on:click="$store.app.showTab('library')">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Library</span>
    </button>
    <button class="nav-item" :class="{ 'active': $store.app.activeTab === 'trends' }" x-on:click="$store.app.showTab('trends')">
        <span class="nav-icon">📈</span>
        <span class="nav-label">Trends</span>
    </button>
    <button class="nav-item" :class="{ 'active': $store.app.activeTab === 'settings' }" x-on:click="$store.app.showTab('settings')">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
    </button>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src='https://api.mapbox.com/mapbox.js/plugins/leaflet-fullscreen/v1.0.1/Leaflet.fullscreen.min.js'></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/2.1.0/gpx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="./js/db.js"></script>
<script src="./js/gpx-utils.js"></script>
<script src="./js/store.js"></script>
<script src="./js/components/analyze.js"></script>
<script src="./js/components/library.js"></script>
<script src="./js/components/settings.js"></script>
<script src="./js/main.js"></script>

</body>
</html>
