<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#333333">
    <title>Simple GPX Viewer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href='https://api.mapbox.com/mapbox.js/plugins/leaflet-fullscreen/v1.0.1/leaflet.fullscreen.css' rel='stylesheet' />
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #333;
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            margin: 0;
            font-size: 1.5rem;
            text-align: center;
            flex-grow: 1;
        }
        #menu-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
        }
        #controls {
            padding: 1rem;
            background-color: #f4f4f4;
            border-bottom: 1px solid #ddd;
        }
        #stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            padding: 1rem;
            background-color: #fff;
        }
        .stat-item {
            border: 1px solid #eee;
            padding: 0.5rem;
            border-radius: 4px;
            text-align: center;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #666;
            display: block;
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
        }
        #map {
            flex-grow: 1;
            width: 100%;
        }
        #container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }
        #sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 250px;
            height: 100%;
            background-color: #f9f9f9;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            padding: 1rem;
            z-index: 1000;
            transition: left 0.3s ease;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        #sidebar.active {
            left: 0;
        }
        #sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        #sidebar-overlay.active {
            display: block;
        }
        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .sidebar-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            border-bottom: 1px solid #eee;
        }
        .sidebar-item:hover {
            background-color: #f0f0f0;
        }
        .sidebar-item span {
            cursor: pointer;
            word-break: break-all;
            margin-right: 0.5rem;
        }
        .delete-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 0.2rem 0.5rem;
            cursor: pointer;
        }
        .delete-btn:hover {
            background-color: #ff1a1a;
        }
    </style>
</head>
<body>

<header>
    <button id="menu-toggle" aria-label="Toggle Sidebar">☰</button>
    <h1>GPX Viewer for Runners</h1>
    <div style="width: 40px;"></div> <!-- Spacer for balance -->
</header>

<div id="controls">
    <input type="file" id="gpx-file" accept=".gpx" />
</div>

<div id="stats">
    <div class="stat-item">
        <span class="stat-label">Distance</span>
        <span id="distance" class="stat-value">-</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">Total Time</span>
        <span id="duration" class="stat-value">-</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">Pace</span>
        <span id="pace" class="stat-value">-</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">Elevation Gain</span>
        <span id="elevation-gain" class="stat-value">-</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">Elevation Loss</span>
        <span id="elevation-loss" class="stat-value">-</span>
    </div>
</div>

<div id="sidebar-overlay"></div>
<div id="container">
    <div id="sidebar">
        <h3>Saved Files</h3>
        <div id="saved-list"></div>
    </div>
    <div id="main-content">
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src='https://api.mapbox.com/mapbox.js/plugins/leaflet-fullscreen/v1.0.1/Leaflet.fullscreen.min.js'></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/2.1.0/gpx.min.js"></script>

<script>
    var map = L.map('map', {
        fullscreenControl: true
    }).setView([0, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    var currentTrack;

    document.getElementById('gpx-file').addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (!file) return;

        var reader = new FileReader();
        reader.onload = function(e) {
            var gpxData = e.target.result;
            saveGpx(file.name, gpxData);
            displayGpx(gpxData);
        };
        reader.readAsText(file);
    });

    function saveGpx(name, data) {
        var savedFiles = JSON.parse(localStorage.getItem('gpxFiles') || '{}');
        savedFiles[name] = data;
        localStorage.setItem('gpxFiles', JSON.stringify(savedFiles));
        renderSidebar();
    }

    function loadSavedGpxList() {
        return JSON.parse(localStorage.getItem('gpxFiles') || '{}');
    }

    function deleteGpx(name) {
        var savedFiles = JSON.parse(localStorage.getItem('gpxFiles') || '{}');
        delete savedFiles[name];
        localStorage.setItem('gpxFiles', JSON.stringify(savedFiles));
        renderSidebar();
    }

    function renderSidebar() {
        var savedFiles = loadSavedGpxList();
        var savedList = document.getElementById('saved-list');
        savedList.innerHTML = '';

        Object.keys(savedFiles).forEach(function(name) {
            var item = document.createElement('div');
            item.className = 'sidebar-item';

            var span = document.createElement('span');
            span.textContent = name;
            span.onclick = function() {
                displayGpx(savedFiles[name]);
            };

            var btn = document.createElement('button');
            btn.textContent = 'Delete';
            btn.className = 'delete-btn';
            btn.onclick = function(e) {
                e.stopPropagation();
                deleteGpx(name);
            };

            item.appendChild(span);
            item.appendChild(btn);
            savedList.appendChild(item);
        });
    }

    // Sidebar toggle logic
    var menuToggle = document.getElementById('menu-toggle');
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('sidebar-overlay');

    function toggleSidebar() {
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }

    menuToggle.addEventListener('click', toggleSidebar);
    overlay.addEventListener('click', toggleSidebar);

    // Initial render
    renderSidebar();

    function displayGpx(gpxData) {
        // Close sidebar on mobile/drawer mode when a file is selected
        if (sidebar.classList.contains('active')) {
            toggleSidebar();
        }

        if (currentTrack) {
            map.removeLayer(currentTrack);
        }

        currentTrack = new L.GPX(gpxData, {
            async: true,
            marker_options: {
                startIconUrl: 'https://cdn.jsdelivr.net/gh/mpetazzoni/leaflet-gpx@master/pin-icon-start.png',
                endIconUrl: 'https://cdn.jsdelivr.net/gh/mpetazzoni/leaflet-gpx@master/pin-icon-end.png',
                shadowUrl: 'https://cdn.jsdelivr.net/gh/mpetazzoni/leaflet-gpx@master/pin-shadow.png'
            }
        }).on('loaded', function(e) {
            var gpx = e.target;
            map.fitBounds(gpx.getBounds());

            // Distance in km
            var distKm = gpx.get_distance() / 1000;
            document.getElementById('distance').textContent = distKm.toFixed(2) + " km";

            // Duration
            var durationMs = gpx.get_total_time();
            document.getElementById('duration').textContent = formatDuration(durationMs);

            // Pace (min/km)
            if (distKm > 0) {
                var paceMinPerKm = (durationMs / 1000 / 60) / distKm;
                document.getElementById('pace').textContent = formatPace(paceMinPerKm);
            } else {
                document.getElementById('pace').textContent = "-";
            }

            // Elevation
            document.getElementById('elevation-gain').textContent = gpx.get_elevation_gain().toFixed(0) + " m";
            document.getElementById('elevation-loss').textContent = gpx.get_elevation_loss().toFixed(0) + " m";

        }).addTo(map);
    }

    function formatDuration(ms) {
        var s = Math.floor(ms / 1000);
        var h = Math.floor(s / 3600);
        s %= 3600;
        var m = Math.floor(s / 60);
        s %= 60;

        var res = "";
        if (h > 0) res += h + "h ";
        res += m + "m " + s + "s";
        return res;
    }

    function formatPace(minPerKm) {
        var min = Math.floor(minPerKm);
        var sec = Math.round((minPerKm - min) * 60);
        if (sec === 60) {
            min++;
            sec = 0;
        }
        return min + ":" + (sec < 10 ? "0" : "") + sec + " /km";
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then((registration) => {
                console.log('ServiceWorker registration successful with scope: ', registration.scope);
            }, (err) => {
                console.log('ServiceWorker registration failed: ', err);
            });
        });
    }
</script>

</body>
</html>
